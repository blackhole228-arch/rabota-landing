<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram</title>

<!-- Facebook Pixel -->
<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;
n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;
n.loaded=!0;
n.version='2.0';
n.queue=[];
t=b.createElement(e);
t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s);
}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '27191367827138349');
fbq('track', 'PageView');
</script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#ffffff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
padding:20px;
}

h1{
font-size:72px;
font-weight:900;
margin-bottom:25px;
}

h2{
font-size:38px;
font-weight:700;
margin-bottom:50px;
}

.button{
display:inline-block;
background:#2AABEE;
color:#fff;
text-decoration:none;
padding:22px 60px;
font-size:28px;
font-weight:700;
border-radius:14px;
transition:.2s;
}

.button:hover{
transform:scale(1.03);
}
</style>
</head>

<body>

<div class="container">
<h1 id="title">GO TO TELEGRAM</h1>
<h2 id="subtitle">NO DEPOSIT REQUIRED</h2>

<a id="telegramBtn"
class="button"
href="https://t.me/english_channel"
onclick="fbq('track','Lead');">
OPEN TELEGRAM
</a>
</div>

<script>

const lang = navigator.language.toLowerCase();

const texts = {

bg:[
"ОТВОРЕТЕ TELEGRAM",
"НЕ СЕ ИЗИСКВА ДЕПОЗИТ",
"ОТВОРИ TELEGRAM"
],

de:[
"ZU TELEGRAM",
"KEINE EINZAHLUNG ERFORDERLICH",
"TELEGRAM ÖFFNEN"
],

fr:[
"ALLER SUR TELEGRAM",
"AUCUN DÉPÔT REQUIS",
"OUVRIR TELEGRAM"
],

it:[
"VAI SU TELEGRAM",
"NESSUN DEPOSITO RICHIESTO",
"APRI TELEGRAM"
],

nl:[
"GA NAAR TELEGRAM",
"GEEN STORTING VEREIST",
"OPEN TELEGRAM"
],

pl:[
"PRZEJDŹ DO TELEGRAM",
"BEZ DEPOZYTU",
"OTWÓRZ TELEGRAM"
],

pt:[
"IR PARA TELEGRAM",
"NENHUM DEPÓSITO NECESSÁRIO",
"ABRIR TELEGRAM"
],

ro:[
"MERGI PE TELEGRAM",
"NU ESTE NECESAR DEPOZIT",
"DESCHIDE TELEGRAM"
],

es:[
"IR A TELEGRAM",
"NO SE REQUIERE DEPÓSITO",
"ABRIR TELEGRAM"
],

cs:[
"PŘEJÍT NA TELEGRAM",
"NENÍ VYŽADOVÁN VKLAD",
"OTEVŘÍT TELEGRAM"
],

sk:[
"PREJSŤ NA TELEGRAM",
"BEZ VKLADU",
"OTVORIŤ TELEGRAM"
],

hr:[
"IDI NA TELEGRAM",
"NIJE POTREBAN DEPOZIT",
"OTVORI TELEGRAM"
],

sr:[
"IDI NA TELEGRAM",
"NIJE POTREBAN DEPOZIT",
"OTVORI TELEGRAM"
],

fi:[
"SIIRRY TELEGRAMIIN",
"TALLETUSTA EI TARVITA",
"AVAA TELEGRAM"
],

el:[
"ΜΕΤΑΒΑΣΗ ΣΤΟ TELEGRAM",
"ΔΕΝ ΑΠΑΙΤΕΙΤΑΙ ΚΑΤΑΘΕΣΗ",
"ΑΝΟΙΓΜΑ TELEGRAM"
]
};

for(let key in texts){

if(lang.startsWith(key)){

document.getElementById("title").innerText=texts[key][0];
document.getElementById("subtitle").innerText=texts[key][1];
document.getElementById("telegramBtn").innerText=texts[key][2];

break;
}
}

/* TELEGRAM LINKS */

let telegramLink = "https://t.me/english_channel";

if(lang.startsWith("bg")){
telegramLink = "https://t.me/bulgaria_channel";
}

else if(lang.startsWith("de")){
telegramLink = "https://t.me/germany_channel";
}

else if(lang.startsWith("fr")){
telegramLink = "https://t.me/france_channel";
}

else if(lang.startsWith("it")){
telegramLink = "https://t.me/italy_channel";
}

else if(lang.startsWith("nl")){
telegramLink = "https://t.me/netherlands_channel";
}

else if(lang.startsWith("pl")){
telegramLink = "https://t.me/poland_channel";
}

else if(lang.startsWith("pt")){
telegramLink = "https://t.me/portugal_channel";
}

else if(lang.startsWith("ro")){

}

else if(lang.startsWith("es")){

else if(lang.startsWith("cs")){

}

else if(lang.startsWith("sr")){

}

else if(lang.startsWith("fi")){
telegramLink = "https://t.me/finland_channel";
}

else if(lang.startsWith("el")){
telegramLink = "https://t.me/greece_channel";
}

document.getElementById("telegramBtn").href = telegramLink;

</script>

</body>
</html>
