<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Remote work opportunities">
  <title>Remote Work</title>

  <!-- Meta Pixel -->
  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)
    }(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init','27191367827138349');
    fbq('track','PageView');
  </script>

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,.18), transparent 36%),
        linear-gradient(145deg, #f8fafc 0%, #eef2ff 100%);
      color: #0f172a;
    }
    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 760px);
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 28px;
      padding: 42px;
      box-shadow: 0 24px 70px rgba(15,23,42,.12);
      text-align: center;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }
    select {
      max-width: 190px;
      padding: 10px 36px 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #fff;
      font-size: 14px;
      color: #334155;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #3730a3;
      font-weight: 700;
      font-size: 14px;
    }
    h1 {
      margin: 22px auto 14px;
      max-width: 650px;
      font-size: clamp(36px, 7vw, 66px);
      line-height: 1.02;
      letter-spacing: -0.045em;
    }
    .subtitle {
      margin: 0 auto;
      max-width: 580px;
      color: #475569;
      font-size: clamp(17px, 2.5vw, 21px);
      line-height: 1.55;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 32px 0;
    }
    .feature {
      padding: 18px 12px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-weight: 700;
      color: #334155;
    }
    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 60px;
      padding: 16px 24px;
      border: 0;
      border-radius: 16px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(37,99,235,.28);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(37,99,235,.34);
    }
    .note {
      margin: 16px 0 0;
      color: #64748b;
      font-size: 13px;
      line-height: 1.5;
    }
    @media (max-width: 620px) {
      .page { padding: 12px; }
      .card { padding: 24px 18px; border-radius: 20px; }
      .topbar { margin-bottom: 16px; }
      .features { grid-template-columns: 1fr; margin: 24px 0; }
      h1 { margin-top: 18px; }
    }
  </style>
</head>
<body>
  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=27191367827138349&ev=PageView&noscript=1"
      alt="">
  </noscript>

  <main class="page">
    <section class="card">
      <div class="topbar">
        <select id="languageSwitcher" aria-label="Language"></select>
      </div>

      <div class="badge" id="badge">Remote opportunity</div>
      <h1 id="title">Work online from your phone</h1>
      <p class="subtitle" id="subtitle">Flexible remote tasks with clear instructions. Open Telegram to see the details.</p>

      <div class="features">
        <div class="feature" id="feature1">Flexible schedule</div>
        <div class="feature" id="feature2">Phone or laptop</div>
        <div class="feature" id="feature3">Remote format</div>
      </div>

      <a class="cta" id="telegramButton" href="https://t.me/USERNAME" target="_blank" rel="noopener noreferrer">
        Open Telegram
      </a>

      <p class="note" id="note">By continuing, you agree to review the terms and requirements in Telegram.</p>
    </section>
  </main>

  <script>
    /*
      ЗАМЕНИТЕ USERNAME НА НУЖНЫЕ TELEGRAM-ССЫЛКИ.
      Можно поставить одну и ту же ссылку для всех GEO или отдельную для каждой страны.
    */
    const TELEGRAM_LINKS = {
      US: "https://t.me/USERNAME",
      BG: "https://t.me/USERNAME",
      HR: "https://t.me/USERNAME",
      CZ: "https://t.me/USERNAME",
      DE: "https://t.me/USERNAME",
      FI: "https://t.me/USERNAME",
      FR: "https://t.me/USERNAME",
      GR: "https://t.me/USERNAME",
      IT: "https://t.me/USERNAME",
      NL: "https://t.me/USERNAME",
      PL: "https://t.me/USERNAME",
      PT: "https://t.me/USERNAME",
      RO: "https://t.me/USERNAME",
      RS: "https://t.me/USERNAME",
      SK: "https://t.me/USERNAME",
      ES: "https://t.me/USERNAME",
      DEFAULT: "https://t.me/USERNAME"
    };

    const GEO_TO_LANG = {
      US: "en", BG: "bg", HR: "hr", CZ: "cs", DE: "de", FI: "fi",
      FR: "fr", GR: "el", IT: "it", NL: "nl", PL: "pl", PT: "pt",
      RO: "ro", RS: "sr", SK: "sk", ES: "es"
    };

    const TEXTS = {
      en: {name:"English", badge:"Remote opportunity", title:"Work online from your phone", subtitle:"Flexible remote tasks with clear instructions. Open Telegram to see the details.", f1:"Flexible schedule", f2:"Phone or laptop", f3:"Remote format", button:"Open Telegram", note:"By continuing, you agree to review the terms and requirements in Telegram."},
      bg: {name:"Български", badge:"Дистанционна възможност", title:"Работете онлайн от телефона си", subtitle:"Гъвкави дистанционни задачи с ясни инструкции. Отворете Telegram за подробности.", f1:"Гъвкав график", f2:"Телефон или лаптоп", f3:"Дистанционен формат", button:"Отвори Telegram", note:"Продължавайки, се съгласявате да прегледате условията и изискванията в Telegram."},
      hr: {name:"Hrvatski", badge:"Prilika za rad na daljinu", title:"Radite online putem telefona", subtitle:"Fleksibilni udaljeni zadaci s jasnim uputama. Otvorite Telegram za detalje.", f1:"Fleksibilan raspored", f2:"Telefon ili laptop", f3:"Rad na daljinu", button:"Otvori Telegram", note:"Nastavkom pristajete pregledati uvjete i zahtjeve u Telegramu."},
      cs: {name:"Čeština", badge:"Příležitost práce na dálku", title:"Pracujte online z telefonu", subtitle:"Flexibilní vzdálené úkoly s jasnými pokyny. Podrobnosti najdete v Telegramu.", f1:"Flexibilní rozvrh", f2:"Telefon nebo notebook", f3:"Práce na dálku", button:"Otevřít Telegram", note:"Pokračováním souhlasíte s kontrolou podmínek a požadavků v Telegramu."},
      de: {name:"Deutsch", badge:"Remote-Arbeitsmöglichkeit", title:"Online mit dem Smartphone arbeiten", subtitle:"Flexible Remote-Aufgaben mit klaren Anweisungen. Details finden Sie auf Telegram.", f1:"Flexibler Zeitplan", f2:"Smartphone oder Laptop", f3:"Remote-Format", button:"Telegram öffnen", note:"Mit dem Fortfahren stimmen Sie zu, die Bedingungen und Anforderungen auf Telegram zu prüfen."},
      fi: {name:"Suomi", badge:"Etätyömahdollisuus", title:"Työskentele verkossa puhelimellasi", subtitle:"Joustavia etätehtäviä selkeillä ohjeilla. Avaa Telegram nähdäksesi tiedot.", f1:"Joustava aikataulu", f2:"Puhelin tai kannettava", f3:"Etämuoto", button:"Avaa Telegram", note:"Jatkamalla hyväksyt, että tarkistat ehdot ja vaatimukset Telegramissa."},
      fr: {name:"Français", badge:"Opportunité à distance", title:"Travaillez en ligne depuis votre téléphone", subtitle:"Des tâches à distance flexibles avec des instructions claires. Ouvrez Telegram pour les détails.", f1:"Horaire flexible", f2:"Téléphone ou ordinateur", f3:"Format à distance", button:"Ouvrir Telegram", note:"En continuant, vous acceptez de consulter les conditions et exigences dans Telegram."},
      el: {name:"Ελληνικά", badge:"Ευκαιρία εξ αποστάσεως", title:"Εργαστείτε online από το κινητό σας", subtitle:"Ευέλικτες απομακρυσμένες εργασίες με σαφείς οδηγίες. Ανοίξτε το Telegram για λεπτομέρειες.", f1:"Ευέλικτο ωράριο", f2:"Κινητό ή laptop", f3:"Εξ αποστάσεως", button:"Άνοιγμα Telegram", note:"Συνεχίζοντας, συμφωνείτε να ελέγξετε τους όρους και τις απαιτήσεις στο Telegram."},
      it: {name:"Italiano", badge:"Opportunità da remoto", title:"Lavora online dal tuo telefono", subtitle:"Attività da remoto flessibili con istruzioni chiare. Apri Telegram per i dettagli.", f1:"Orario flessibile", f2:"Telefono o laptop", f3:"Formato remoto", button:"Apri Telegram", note:"Continuando, accetti di consultare termini e requisiti su Telegram."},
      nl: {name:"Nederlands", badge:"Mogelijkheid voor werken op afstand", title:"Werk online vanaf je telefoon", subtitle:"Flexibele taken op afstand met duidelijke instructies. Open Telegram voor meer informatie.", f1:"Flexibel schema", f2:"Telefoon of laptop", f3:"Werken op afstand", button:"Telegram openen", note:"Door verder te gaan, ga je ermee akkoord de voorwaarden en vereisten in Telegram te bekijken."},
      pl: {name:"Polski", badge:"Możliwość pracy zdalnej", title:"Pracuj online przez telefon", subtitle:"Elastyczne zadania zdalne z jasnymi instrukcjami. Otwórz Telegram, aby poznać szczegóły.", f1:"Elastyczny grafik", f2:"Telefon lub laptop", f3:"Praca zdalna", button:"Otwórz Telegram", note:"Kontynuując, zgadzasz się zapoznać z warunkami i wymaganiami w Telegramie."},
      pt: {name:"Português", badge:"Oportunidade remota", title:"Trabalhe online pelo seu telemóvel", subtitle:"Tarefas remotas flexíveis com instruções claras. Abra o Telegram para ver os detalhes.", f1:"Horário flexível", f2:"Telemóvel ou portátil", f3:"Formato remoto", button:"Abrir Telegram", note:"Ao continuar, concorda em consultar os termos e requisitos no Telegram."},
      ro: {name:"Română", badge:"Oportunitate la distanță", title:"Lucrează online de pe telefon", subtitle:"Sarcini flexibile la distanță, cu instrucțiuni clare. Deschide Telegram pentru detalii.", f1:"Program flexibil", f2:"Telefon sau laptop", f3:"Format la distanță", button:"Deschide Telegram", note:"Continuând, ești de acord să consulți termenii și cerințele în Telegram."},
      sr: {name:"Srpski", badge:"Mogućnost rada na daljinu", title:"Radite online preko telefona", subtitle:"Fleksibilni zadaci na daljinu sa jasnim uputstvima. Otvorite Telegram za detalje.", f1:"Fleksibilan raspored", f2:"Telefon ili laptop", f3:"Rad na daljinu", button:"Otvori Telegram", note:"Nastavkom pristajete da pregledate uslove i zahteve u Telegramu."},
      sk: {name:"Slovenčina", badge:"Príležitosť práce na diaľku", title:"Pracujte online z telefónu", subtitle:"Flexibilné vzdialené úlohy s jasnými pokynmi. Podrobnosti nájdete v Telegrame.", f1:"Flexibilný rozvrh", f2:"Telefón alebo notebook", f3:"Práca na diaľku", button:"Otvoriť Telegram", note:"Pokračovaním súhlasíte s kontrolou podmienok a požiadaviek v Telegrame."},
      es: {name:"Español", badge:"Oportunidad remota", title:"Trabaja online desde tu teléfono", subtitle:"Tareas remotas flexibles con instrucciones claras. Abre Telegram para ver los detalles.", f1:"Horario flexible", f2:"Teléfono u ordenador", f3:"Formato remoto", button:"Abrir Telegram", note:"Al continuar, aceptas consultar los términos y requisitos en Telegram."}
    };

    let detectedCountry = "DEFAULT";

    function getTrackedUrl(baseUrl) {
      const target = new URL(baseUrl);
      const current = new URLSearchParams(window.location.search);
      ["utm_source","utm_medium","utm_campaign","utm_content","utm_term","fbclid"].forEach(key => {
        const value = current.get(key);
        if (value) target.searchParams.set(key, value);
      });
      return target.toString();
    }

    function render(lang, country = detectedCountry) {
      const t = TEXTS[lang] || TEXTS.en;
      document.documentElement.lang = lang;
      document.getElementById("badge").textContent = t.badge;
      document.getElementById("title").textContent = t.title;
      document.getElementById("subtitle").textContent = t.subtitle;
      document.getElementById("feature1").textContent = t.f1;
      document.getElementById("feature2").textContent = t.f2;
      document.getElementById("feature3").textContent = t.f3;
      document.getElementById("telegramButton").textContent = t.button;
      document.getElementById("note").textContent = t.note;
      document.getElementById("languageSwitcher").value = lang;

      const link = TELEGRAM_LINKS[country] || TELEGRAM_LINKS.DEFAULT;
      document.getElementById("telegramButton").href = getTrackedUrl(link);
    }

    function buildLanguageSwitcher() {
      const select = document.getElementById("languageSwitcher");
      Object.entries(TEXTS).forEach(([code, text]) => {
        const option = document.createElement("option");
        option.value = code;
        option.textContent = text.name;
        select.appendChild(option);
      });

      select.addEventListener("change", event => {
        localStorage.setItem("preferred_language", event.target.value);
        render(event.target.value);
      });
    }

    async function detectGeo() {
      const savedLanguage = localStorage.getItem("preferred_language");

      try {
        const response = await fetch("https://ipapi.co/json/", {cache: "no-store"});
        if (!response.ok) throw new Error("Geo request failed");
        const data = await response.json();
        detectedCountry = String(data.country_code || "DEFAULT").toUpperCase();
      } catch (error) {
        detectedCountry = "DEFAULT";
      }

      const browserLanguage = (navigator.language || "en").split("-")[0].toLowerCase();
      const selectedLanguage =
        savedLanguage ||
        GEO_TO_LANG[detectedCountry] ||
        (TEXTS[browserLanguage] ? browserLanguage : "en");

      render(selectedLanguage, detectedCountry);
    }

    document.getElementById("telegramButton").addEventListener("click", () => {
      if (typeof fbq === "function") {
        fbq("track", "Lead", {
          content_name: "Telegram button",
          country: detectedCountry
        });
      }
    });

    buildLanguageSwitcher();
    detectGeo();
  </script>
</body>
</html>
